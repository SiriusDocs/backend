syntax = "proto3";

package auth;

// import "api/proto/";

option go_package = "git.wolkodaf2946.ru/Wolkodaf/microservices_prac/api_gateway/pkg/api/auth";

service Auth {
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
    //rpc GetNewTokens(TokensRequest) returns (TokenResponce);
}

message User {
    string username = 1;
    string email = 2;
    string password = 3;
}

message RegisterRequest {
    User user = 1;
}

message RegisterResponse {
    int64 user_id= 1;
    string error = 2;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message LoginResponse {
  string token = 1;
}

